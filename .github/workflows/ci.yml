name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retail
          POSTGRES_PASSWORD: retail
          POSTGRES_DB: retail
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U retail"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://retail:retail@localhost:5432/retail?schema=public
      AUTH_SECRET: ci-secret-ci-secret-ci-secret-32
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
